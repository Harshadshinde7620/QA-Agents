      - paragraph [ref=e90]: Michael Combs
      - paragraph [ref=e91]: "Very disappointing overall. The server was rude, I was told that several items on the menu were not available, and the quality of the food was not good. The carrot halwa for example was heated in a way that the outside of the plate was hot but the inside, the deeper portion of the dessert was still icy and cold. That was disgusting and when I told my server that the dish was frozen she was very defensive instantly and said in a rude tone that the restaurant does not serve anything frozen and that all dishes are made fresh every day in the kitchen. I told her again that the dish is frozen and had her feel the plate. It was only then that she realized that it was indeed frozen and apologized and just said that she would heat it longer. They didn’t offer an option for a refund or even the opportunity to choose something else. To make things worse I sat by the kitchen and could hear to staff arguing amongst each other the entire time. Upon returning home from this place I even got sick. The only good thing about this restaurant was the modern design/atmosphere. I was going to give 2 stars instead of only 1 because I see some room for growth especially with the customer service, but after considering it Urban Indian really needs to get it together. It’s a shame because this place could probably be really good. Food: 1/5Service: 1/5Atmosphere: 3/5 Wait time No wait Seating type Indoor dining area, Booth seating Parking space Plenty of parking Parking options Free of charge parking lot"
      - paragraph [ref=e92]: 07 Apr 2026
      - generic [ref=e93]: ────────────────────────────────────
