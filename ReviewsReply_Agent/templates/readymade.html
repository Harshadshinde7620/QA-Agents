{% extends "base.html" %}

{% block content %}

<h1 class="text-2xl font-bold mb-4">Readymade Review Replies</h1>

<div class="bg-white p-4 rounded shadow">

    <select id="restaurant" class="border p-2 mb-3">
        <option value="Urban Indian">Urban Indian</option>
        <option value="Aroma Indian Cuisine">Aroma Indian Cuisine</option>
    </select>

    <select id="type" class="border p-2 mb-3">
        <option value="5">5 Star</option>
        <option value="4">4 Star</option>
        <option value="3">3 Star</option>
        <option value="2">2 Star</option>
        <option value="1">1 Star</option>
    </select>

    <button onclick="generate()" class="bg-blue-600 text-white px-4 py-2 rounded">
        Generate Reply
    </button>

    <div id="output-container" class="mt-6">
        <div id="output" class="persistent-output p-4 rounded whitespace-pre-line text-gray-800">
            <span class="output-placeholder">See your AI generated reply here...</span>
        </div>

        <div id="controls" class="mt-4 flex space-x-3 hidden">
            <button onclick="copyReply()" class="bg-green-600 hover:bg-green-700 text-white px-6 py-2 rounded-lg font-medium transition shadow-md">
                Copy Reply
            </button>
            <button onclick="generate()" class="bg-gray-600 hover:bg-gray-700 text-white px-6 py-2 rounded-lg font-medium transition shadow-md">
                Regenerate
            </button>
        </div>
    </div>

</div>

<script>
function generate(){
    const restaurant = document.getElementById('restaurant').value;
    const type = document.getElementById('type').value;
    const outputDiv = document.getElementById('output');
    const controls = document.getElementById('controls');

    outputDiv.innerHTML = '<span class="text-blue-600 animate-pulse">Generating your reply...</span>';
    outputDiv.classList.add('has-content');

    fetch('/api/readymade', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ restaurant: restaurant, type: type })
    })
    .then(res => res.json())
    .then(data => {
        outputDiv.innerText = data.reply;
        controls.classList.remove('hidden');
    })
    .catch(err => {
        outputDiv.innerHTML = '<span class="text-red-500">Error: Could not connect to AI service.</span>';
    });
}

function copyReply() {
    const outputDiv = document.getElementById('output');
    const text = outputDiv.innerText;

    if (!text || outputDiv.querySelector('.output-placeholder')) return;

    navigator.clipboard.writeText(text).then(() => {
        // Clear after copy as requested
        outputDiv.innerHTML = '<span class="output-placeholder">See your AI generated reply here...</span>';
        outputDiv.classList.remove('has-content');
        document.getElementById('controls').classList.add('hidden');
        alert("Reply copied to clipboard and cleared!");
    });
}
</script>

{% endblock %}
