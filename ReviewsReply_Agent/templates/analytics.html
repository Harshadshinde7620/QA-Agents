<!DOCTYPE html>
<html>

<head>
    <title>Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-6 bg-gray-100">

    <h1 class="text-2xl font-bold mb-4">Analytics</h1>

    <select id="restaurant" class="border p-2 mb-4">
        <option>Aroma Indian</option>
        <option>Urban Indian</option>
    </select>

    <button onclick="load()" class="bg-blue-500 text-white px-4 py-2">Load</button>

    <div id="stats" class="mt-6 bg-white p-4 shadow"></div>

    <script>

        async function load() {
            const r = document.getElementById('restaurant').value;

            const res = await fetch('/api/analytics', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ restaurant: r })
            });

            const data = await res.json();

            document.getElementById('stats').innerHTML = `
        Total Replies: ${data.total_replies || 0}<br>
        Avg Score: ${data.average_score || 0}<br>
        Best Style: ${data.best_style || 'N/A'}<br>
        Best Score: ${data.best_score || 0}
    `;
        }

    </script>

</body>

</html>
