<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Review Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .output-placeholder {
            color: #9ca3af;
            font-style: italic;
        }
        .persistent-output {
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            border: 2px dashed #e5e7eb;
            background-color: #f9fafb;
            transition: all 0.3s ease;
        }
        .persistent-output.has-content {
            border-style: solid;
            background-color: #ffffff;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 50;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 2rem;
            border-radius: 12px;
            width: 70%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>

<body class="bg-gray-100">

<div class="flex h-screen">

    <!-- Sidebar -->
    <div class="w-64 bg-gray-900 text-white flex flex-col p-4">
        <h2 class="text-xl font-bold mb-6">Review Agent</h2>

        <a href="/" class="mb-3 hover:bg-gray-700 p-2 rounded">Dashboard</a>
        <a href="/vault" class="mb-3 hover:bg-gray-700 p-2 rounded">Document Vault</a>
        <a href="/readymade" class="mb-3 hover:bg-gray-700 p-2 rounded">Readymade Replies</a>
    </div>

    <!-- Main Content -->
    <div class="flex-1 p-6 overflow-y-auto">
        {% block content %}{% endblock %}
    </div>

</div>

</body>
</html>
